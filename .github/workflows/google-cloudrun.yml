name: Build and Deploy to Google Cloud Run

on:
  push:
    branches:
      - master

env:
  PROJECT_ID: thebeautywizard               # Update with your Google Cloud Project ID
  GAR_LOCATION: us-central1                 # Update with your Artifact Registry region
  REPOSITORY: beauty-wizard-repo            # Update with your Artifact Registry repository name
  SERVICE: beauty-wizard-salon              # Update with your Cloud Run Service name
  REGION: us-central1                       # Update with your Cloud Run Service region

jobs:
  deploy:
    name: Build & Deploy Container
    runs-on: ubuntu-latest
    
    # Add permissions for Workload Identity Federation (recommended)
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Authentication Option: Service Account Key (standard approach)
      # Store your service account JSON key in GitHub Secrets as GCP_SA_KEY
      - name: Authenticate with Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # Set up Cloud SDK
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # Configure Docker to authenticate with Google Artifact Registry
      - name: Configure Docker Auth
        run: |
          gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

      # Build the Docker image
      - name: Build Docker Image
        run: |
          docker build \
            -t "${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE }}:${{ github.sha }}" \
            .

      # Push the Docker image to Artifact Registry
      - name: Push Docker Image
        run: |
          docker push "${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE }}:${{ github.sha }}"

      # Deploy the image to Google Cloud Run
      - name: Deploy to Google Cloud Run
        id: deploy-run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE }}:${{ github.sha }}
          flags: '--allow-unauthenticated' # Allows public internet traffic to access the salon page

      # Output the Cloud Run Service URL
      - name: Show Deployment URL
        run: |
          echo "Your active Cloud Run service URL is: ${{ steps.deploy-run.outputs.url }}"
